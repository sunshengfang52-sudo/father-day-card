<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>父亲节快乐</title>

  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #dbeafe, #ffffff);
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .hero {
      background: url("img/ssf.png") center/cover;
      height: 500px;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.8);
      padding: 15px;
      text-align: center;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      color: #1e3a8a;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
    }

    .msg {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>
<div class="card">

  <div class="hero">
    <div class="overlay">
      <div class="title">父亲节快乐 ❤️</div>
      <div class="subtitle">谢谢您一直默默付出</div>
    </div>
  </div>

  <div class="msg">
    <p>爸爸，感谢你为我撑起一片天。</p>
    <p>你的爱，是我前行路上最温暖的光。</p>
    <p>愿你健康平安，一切顺遂。</p>
  </div>

  <div class="footer">
    ❤️ 父亲节快乐 ❤️
  </div>

</div>
</body>
</html>
